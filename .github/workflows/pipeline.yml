name: AI Dev Pipeline - TEST MODE

on:
  push:
    paths:
      - 'drafts/*.md'
  workflow_dispatch:

jobs:
  simple-test:
    runs-on: [self-hosted, windows, ai]
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v3

      - name: 🚀 Say Hello
        run: |
          Write-Host "✅ Runner working on: $env:COMPUTERNAME"
          Write-Host "📁 In folder: $(Get-Location)"
          Write-Host "🔧 PowerShell version: $PSVersionTable.PSVersion"

      - name: 📝 Create Test File
        run: |
          # Создаём папку если нет
          New-Item -Path src -ItemType Directory -Force | Out-Null
          
          # Пишем файл с результатом
          $content = @"
# AI Pipeline Test Result ✅

Generated at: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
Runner: $env:COMPUTERNAME
Draft: $env:GITHUB_TRIGGERING_ACTOR

## Что произошло:
1. Ты создал драфт в drafts/
2. Git push отправил его на GitHub
3. Раннер подхватил задачу
4. Этот файл создан автоматически!

## Следующий шаг:
- Открой этот файл
- Посмотри, что всё работает
- Создай свой первый реальный драфт
"@
          $content | Out-File src/hello-ai.txt -Encoding utf8
          Write-Host "✅ Created src/hello-ai.txt"

      - name: 💾 Commit Result
        run: |
          git config --local user.email "pipeline@local"
          git config --local user.name "AI Pipeline"
          
          git add src/hello-ai.txt
          if (git diff --cached --name-only) {
            git commit -m "🤖 Test: generated hello-ai.txt"
            git push
            Write-Host "✅ Committed and pushed"
          } else {
            Write-Host "⚠️ Nothing to commit"
          }
