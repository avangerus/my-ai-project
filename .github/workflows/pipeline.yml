name: AI Dev Pipeline

on:
  push:
    paths:
      - 'drafts/*.md'
  workflow_dispatch:
    inputs:
      draft_file:
        description: 'Draft file to process'
        required: true
        type: string
      mode:
        description: 'Mode: code или full'
        required: true
        default: 'code'
        type: choice
        options: [code, full]

jobs:
  generate-and-code:
    runs-on: [self-hosted, windows, ai-runner]
    defaults:
      run:
        shell: powershell
    env:
      OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v3

      # === ШАГ 1: Простая генерация промпта ===
      - name: Prepare Prompt
        run: |
          New-Item -Path .tmp -ItemType Directory -Force | Out-Null
          
          # Берем содержимое драфта
          $draftFile = $env:DRAFT_FILE -replace 'null', 'drafts/_template.md'
          if (-not (Test-Path $draftFile)) { $draftFile = (Get-ChildItem drafts/*.md | Select-Object -First 1).FullName }
          
          $draft = Get-Content $draftFile -Raw -ErrorAction SilentlyContinue
          
          # Если есть OpenRouter - улучшаем промпт, иначе берем как есть
          if ($env:OPENROUTER_KEY) {
            Write-Host "✨ Generating optimized prompt via OpenRouter..."
            $body = @{
              model = "qwen/qwen3.5-flash-02-23"
              messages = @(
                @{ role = "system"; content = "Create a concise technical prompt for Codex CLI. Output ONLY the prompt." },
                @{ role = "user"; content = "Task: $draft" }
              )
            } | ConvertTo-Json -Depth 5
            
            try {
              $resp = Invoke-RestMethod -Uri "https://openrouter.ai/api/v1/chat/completions" `
                -Headers @{ Authorization = "Bearer $env:OPENROUTER_KEY"; "Content-Type" = "application/json" } `
                -Method Post -Body $body -TimeoutSec 30
              $prompt = $resp.choices[0].message.content
            } catch {
              Write-Warning "OpenRouter failed, using draft as-is: $_"
              $prompt = $draft
            }
          } else {
            Write-Host "⚠️ No OpenRouter key, using draft as prompt"
            $prompt = $draft
          }
          
          $prompt | Out-File .tmp/codex_prompt.txt -Encoding utf8
          Write-Host "✅ Prompt saved to .tmp/codex_prompt.txt"

      # === ШАГ 2: Запуск Codex CLI ===
      - name: Run Codex CLI
        run: |
          Write-Host "🤖 Running Codex CLI..."
          
          # !!! АДАПТИРУЙ ПОД СВОЮ КОМАНДУ !!!
          # Пример для codex:
          if (Get-Command codex -ErrorAction SilentlyContinue) {
            codex run --prompt-file .tmp/codex_prompt.txt --output-dir src/ --verbose 2>&1 | Tee-Object -FilePath .tmp/codex.log
          } else {
            Write-Warning "codex not found. Creating dummy file for test."
            "/* Test code generated by pipeline */`nconsole.log('Hello from AI pipeline');" | Out-File src/test.js -Encoding utf8
          }

      # === ШАГ 3: Коммит результатов ===
      - name: Commit Changes
        run: |
          git config --local user.email "ai-pipeline@local"
          git config --local user.name "AI Pipeline"
          
          git add src/ .tmp/
          $changes = git diff --cached --name-only
          
          if ($changes) {
            git commit -m "🤖 AI: Generated code for $(Split-Path $env:DRAFT_FILE -Leaf)"
            git push
            Write-Host "✅ Changes committed"
          } else {
            Write-Host "⚠️ No changes to commit"
          }

      # === ШАГ 4: Саммари ===
      - name: Write Summary
        run: |
          $summary = @"
## $(Get-Date -Format 'yyyy-MM-dd HH:mm')

### Task
$(Split-Path $env:DRAFT_FILE -Leaf)

### Result
✅ Code generation completed
$(if (Test-Path .tmp/codex.log) { "📄 Log: .tmp/codex.log" })

### Files changed
$(git diff --name-only HEAD~1 HEAD 2>`$null | ForEach-Object { "- $_" } | Out-String)
"@
          $summaryFile = "docs/summaries/$(Get-Date -Format 'yyyy-MM-dd_HH-mm').md"
          $summary | Out-File $summaryFile -Encoding utf8
          
          git add $summaryFile
          git commit -m "📝 Summary for $(Split-Path $env:DRAFT_FILE -Leaf)" 2>`$null || Write-Host "No summary changes"
          git push 2>`$null || Write-Host "No push needed"

  # === ЭТАП 2: Ревью (только по кнопке) ===
  architecture-review:
    needs: generate-and-code
    runs-on: [self-hosted, windows, ai-runner]
    environment: sprint_review
    if: github.event.inputs.mode == 'full'
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v3
      
      - name: Claude Review
        run: |
          Write-Host "🔍 Starting Claude review..."
          # !!! АДАПТИРУЙ ПОД СВОЙ claude !!!
          if (Get-Command claude -ErrorAction SilentlyContinue) {
            claude review --path . --output docs/architecture/review.md 2>&1 | Tee-Object -FilePath .tmp/claude.log
          } else {
            Write-Warning "claude not found. Skipping review."
          }
          
          git add docs/architecture/
          git commit -m "🔍 Claude review" 2>`$null || Write-Host "No review changes"
          git push 2>`$null || Write-Host "No push needed"