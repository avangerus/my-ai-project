name: AI Dev Pipeline

on:
  push:
    paths:
      - 'drafts/*.md'
  workflow_dispatch:

jobs:
  test-job:
    runs-on: [self-hosted, windows, ai]
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v3

      - name: Say Hello
        run: |
          Write-Host "✅ Runner working on: $env:COMPUTERNAME"
          Write-Host "📁 Working directory: $(Get-Location)"

      - name: Create Test File
        run: |
          New-Item -Path src -ItemType Directory -Force | Out-Null
          "Pipeline works! Generated at $(Get-Date)" | Out-File src/hello-ai.txt -Encoding utf8
          Write-Host "✅ Created src/hello-ai.txt"

      - name: Commit Result
        run: |
          git config --local user.email "pipeline@local"
          git config --local user.name "AI Pipeline"
          git add src/hello-ai.txt
          $changes = git diff --cached --name-only
          if ($changes) {
            git commit -m "AI: generated hello-ai.txt"
            git push
          } else {
            Write-Host "No changes to commit"
          }